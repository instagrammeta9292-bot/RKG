<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK - Create New Account</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/signup.js"></script>
</head>

<body>

<div class="background"></div>

<div class="login-container">

    <div class="logo-box">
        <h1 class="logo">RHK</h1>
        <p class="tagline">
            Create your RHK account
        </p>
    </div>

    <form id="signupForm">

        <div class="input-box">
            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>
        </div>

        <div class="input-box">
            <input
                type="password"
                id="password"
                placeholder="Password"
                minlength="6"
                required>
        </div>

        <div class="input-box">
            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                minlength="6"
                required>
        </div>

        <button
            type="submit"
            class="login-btn">
            Create Account
        </button>

        <p id="message"></p>

    </form>

    <div class="divider">
        <span>Already have an account?</span>
    </div>

    <button
        class="create-btn"
        onclick="window.location.href='index.html'">
        Login
    </button>

</div>

</body>
</html>
