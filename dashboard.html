<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • RHK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="auth-box">
            <h1 class="logo-text">RHK</h1>
