<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RHK Profile</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="css/view-profile.css">

</head>

<body>

<header class="topBar">

<button id="backBtn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>Profile</h2>

<div></div>

</header>

<div class="profileContainer">

<div class="profileCard">

<img
id="profilePhoto"
src=""
class="profilePhoto">

<h2 id="username">

Loading...

</h2>

<p id="bio">

Please wait...

</p>

<div class="stats">

<div>

<h3 id="connections">

0

</h3>

<span>Connections</span>

</div>

</div>

<div id="actionArea">

<button
id="connectBtn"
class="primaryBtn">

Connect

</button>

</div>

</div>

<div class="infoCard">

<h3>

About

</h3>

<p id="aboutText">

No bio available.

</p>

</div>

</div>

<script>

document
.getElementById("backBtn")
.onclick=()=>{

history.back();

};

</script>

<script
type="module"
src="js/view-profile.js">

</script>

</body>

</html>
