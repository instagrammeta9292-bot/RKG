<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RHK Chat</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="css/chat.css">

</head>

<body>

<header class="chatHeader">

<button id="backBtn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div class="headerUser">

<img
id="userPhoto"
class="headerPhoto">

<div>

<h3 id="userName">

Loading...

</h3>

<p id="userStatus">

Offline

</p>

</div>

</div>

</header>

<div
id="messages"
class="messages">

</div>

<div class="messageBar">

<input
type="text"
id="messageInput"
placeholder="Type a message...">

<button id="sendBtn">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<script>

document
.getElementById("backBtn")
.onclick=()=>history.back();

</script>

<script
type="module"
src="js/chat.js">

</script>

</body>

</html>
